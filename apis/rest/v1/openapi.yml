openapi: "3.0.0"

info:
  version: 1.0.0
  title: Product Rest APId
  description: API Rest definition to manage products

servers:
  - url: http://localhost:8080
    description: Local

security:
  - BearerAuth: []

tags:
  - name: Product versions
    description: Section of the product versions

  - name: Reviews
    description: Section of the reviews

paths:
  /v1/products:
    get:
      operationId: search-product-versions
      summary: Search product versions
      description: Search product versions
      tags:
        - Product versions
      parameters:
        - name: pageNumber
          in: query
          required: false
          schema:
            type: integer
          description: Number of the page
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
          description: Size of the page
        - name: order
          in: query
          schema:
            $ref: './products.yml#/components/schemas/ProductOrder'
          description: Order of the result
          required: false
        - name: ascending
          in: query
          required: false
          schema:
            type: boolean
          description: Return data using ascending order
        - name: searchDate
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: Show only active product version at date
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: './products.yml#/components/schemas/ProductVersionSummaryList'
        default:
          $ref: './shared.yml#/components/responses/ProblemDetailsResponse'

  /v1/products/{productCode}/versions:
    get:
      operationId: search-product-version-ids
      summary: Search product versions
      description: Search product version
      tags:
        - Product versions
      parameters:
        - $ref: './products.yml#/components/parameters/productCodePath'
        - name: pageNumber
          in: query
          required: false
          schema:
            type: integer
          description: Number of the page
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
          description: Size of the page
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: './products.yml#/components/schemas/ProductVersionList'
        default:
          $ref: './shared.yml#/components/responses/ProblemDetailsResponse'

  /v1/products/{productCode}/versions/{effectiveDate}:
    post:
      operationId: create-product-version
      summary: Create product version
      description: Create product version
      tags:
        - Product versions
      parameters:
        - $ref: './products.yml#/components/parameters/productCodePath'
        - $ref: './products.yml#/components/parameters/effectiveDatePath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './products.yml#/components/schemas/CreateProductVersionInput'
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: './products.yml#/components/schemas/ProductVersion'
        default:
          $ref: './shared.yml#/components/responses/ProblemDetailsResponse'

    get:
      operationId: get-product-version
      summary: Get product version
      description: Get product version
      tags:
        - Product versions
      parameters:
        - $ref: './products.yml#/components/parameters/productCodePath'
        - $ref: './products.yml#/components/parameters/effectiveDatePath'
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: './products.yml#/components/schemas/ProductVersion'
        default:
          $ref: './shared.yml#/components/responses/ProblemDetailsResponse'

    patch:
      operationId: update-product-version
      summary: Update product version
      description: Update product version
      tags:
        - Product versions
      parameters:
        - $ref: './products.yml#/components/parameters/productCodePath'
        - $ref: './products.yml#/components/parameters/effectiveDatePath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './products.yml#/components/schemas/UpdateProductVersionInput'
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: './products.yml#/components/schemas/ProductVersion'
        default:
          $ref: './shared.yml#/components/responses/ProblemDetailsResponse'

    delete:
      operationId: delete-product-version
      summary: Delete product version
      description: Delete product version
      tags:
        - Product versions
      parameters:
        - $ref: './products.yml#/components/parameters/productCodePath'
        - $ref: './products.yml#/components/parameters/effectiveDatePath'
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: './products.yml#/components/schemas/ProductVersion'
        default:
          $ref: './shared.yml#/components/responses/ProblemDetailsResponse'

  /v1/products/{productCode}/versions/{effectiveDate}/published:
    put:
      operationId: publish-product-version
      summary: Publish product version
      description: Publish product version
      tags:
        - Product versions
      parameters:
        - $ref: './products.yml#/components/parameters/productCodePath'
        - $ref: './products.yml#/components/parameters/effectiveDatePath'
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: './products.yml#/components/schemas/ProductVersion'
        default:
          $ref: './shared.yml#/components/responses/ProblemDetailsResponse'

  /v1/products/{productCode}/versions/{effectiveDate}/unpublished:
    put:
      operationId: unpublish-product-version
      summary: Unpublish product version
      description: Unpublish product version
      tags:
        - Product versions
      parameters:
        - $ref: './products.yml#/components/parameters/productCodePath'
        - $ref: './products.yml#/components/parameters/effectiveDatePath'
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: './products.yml#/components/schemas/ProductVersion'
        default:
          $ref: './shared.yml#/components/responses/ProblemDetailsResponse'

  /v1/reviews:
    post:
      operationId: create-review
      summary: Create review
      description: Create review
      tags:
        - Reviews
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './reviews.yml#/components/schemas/CreateReviewInput'
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: './reviews.yml#/components/schemas/Review'
        default:
          $ref: './shared.yml#/components/responses/ProblemDetailsResponse'

    get:
      operationId: search-reviews
      summary: Search reviews
      description: Search reviews
      tags:
        - Reviews
      parameters:
        - name: pageNumber
          in: query
          required: false
          schema:
            type: integer
          description: Number of the page
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
          description: Size of the page
        - name: order
          in: query
          schema:
            $ref: './reviews.yml#/components/schemas/ReviewOrder'
          description: Order of the result
          required: false
        - name: ascending
          in: query
          required: false
          schema:
            type: boolean
          description: Return data using ascending order
        - name: domain
          in: query
          required: false
          schema:
            type: string
          description: Domain of the entity
        - name: id
          in: query
          required: false
          schema:
            type: string
          description: Id of the entity
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: './reviews.yml#/components/schemas/ReviewList'
        default:
          $ref: './shared.yml#/components/responses/ProblemDetailsResponse'

  /v1/reviews/{reviewId}:
    get:
      operationId: get-review
      summary: Get review
      description: Get review
      tags:
        - Reviews
      parameters:
        - $ref: './reviews.yml#/components/parameters/reviewIdPath'
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: './reviews.yml#/components/schemas/Review'
        default:
          $ref: './shared.yml#/components/responses/ProblemDetailsResponse'

    patch:
      operationId: update-review
      summary: Update review
      description: Update review
      tags:
        - Reviews
      parameters:
        - $ref: './reviews.yml#/components/parameters/reviewIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './reviews.yml#/components/schemas/UpdateReviewInput'
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: './reviews.yml#/components/schemas/Review'
        default:
          $ref: './shared.yml#/components/responses/ProblemDetailsResponse'

    delete:
      operationId: delete-review
      summary: Delete review
      description: Delete review
      tags:
        - Reviews
      parameters:
        - $ref: './reviews.yml#/components/parameters/reviewIdPath'
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: './reviews.yml#/components/schemas/Review'
        default:
          $ref: './shared.yml#/components/responses/ProblemDetailsResponse'

components:

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT security

