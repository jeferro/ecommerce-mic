metadata:
  application-id: products
  environment: local


spring:
  application:
    name: ${metadata.application-id}

  profiles:
    active: ${metadata.environment}
    include:
      - shared


logging:
  level:
    root: WARN
    com.jeferro: INFO
    # org.springframework.data.mongodb.core.MongoTemplate: DEBUG

components:
  products:
    topic: com.jeferro.${metadata.application-id}.${metadata.environment}.products.v1

  reviews:
    reviews-on-product-events-consumer-group-id: ${metadata.application-id}.${metadata.environment}.products.reviews
