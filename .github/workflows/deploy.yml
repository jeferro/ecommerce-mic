
name: 'Deploy'

on:
  pull_request:
    types:
      - closed
    branches:
      - main
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.base_ref }}
  cancel-in-progress: true

env:
  git_user_name: "github-actions[bot]"
  git_user_email: "github-actions[bot]@users.noreply.github.com"
  is_release: ${{ github.head_ref == 'develop' }}

jobs:

  release-version:
    name: Release version
    runs-on: ubuntu-latest
    env:
      # disable default JVM in container
      JAVA_HOME: ""
    steps:
      - name: Check release is necessary
        id: check_release
        run: |
          if [[ "${{ github.event.pull_request.merged }}" == "true" && \
                "${{ github.base_ref }}" == "main" && \
                ( "${{ github.head_ref }}" == "develop" || "${{ github.head_ref }}" =~ ^hotfix ) ]]; then
            echo "apply_release=true" >> $GITHUB_OUTPUT
          else
            echo "apply_release=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout
        if: steps.check_release.outputs.apply_release == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}
          persist-credentials: true

      - name: Configure Git
        if: steps.check_release.outputs.apply_release == 'true'
        run: |
          git config user.name "${{ env.git_user_name }}"
          git config user.email "${{ env.git_user_email }}"

      - name: Install Tools
        if: steps.check_release.outputs.apply_release == 'true'
        uses: ./.github/actions/tools-install

      - name: Generate release version
        if: steps.check_release.outputs.apply_release == 'true'
        uses: ./.github/actions/increase-version
        with:
          properties-path: ./code/gradle.properties
          type: ${{ env.is_release && 'release' || 'hotfix' }}

      - name: Commit release version
        if: steps.check_release.outputs.apply_release == 'true'
        run: |
          APP_VERSION=$(grep "version" ./code/gradle.properties | cut -d'=' -f2)

          git add ./code/gradle.properties

          git commit -m "Release $APP_VERSION"

          git push origin HEAD

          echo "commit version $APP_VERSION"

      - name: Tag release version
        if: steps.check_release.outputs.apply_release == 'true'
        run: |
          APP_VERSION=$(grep "version" ./code/gradle.properties | cut -d'=' -f2)

          git tag -a "$APP_VERSION" -m "New version tag $APP_VERSION"

          git push --tags

          echo "Created tag $APP_VERSION"

      - name: Generate snapshot version
        if: steps.check_release.outputs.apply_release == 'true'
        uses: ./.github/actions/increase-version
        with:
          properties-path: ./code/gradle.properties
          type: snapshot

      - name: Create PR to sync develop
        if: steps.check_release.outputs.apply_release == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APP_VERSION=$(grep "version" ./code/gradle.properties | cut -d'=' -f2)

          git checkout -b "feature/sync-$APP_VERSION"

          git add ./code/gradle.properties

          git commit -m "Snapshot $APP_VERSION"

          git push origin HEAD

          gh pr create --base "develop" --head "feature/sync-$APP_VERSION" --title "Sync develop to $APP_VERSION" --body ""

          echo "Created pr $APP_VERSION"

  compile:
    name: Compile
    needs: [ release-version ]
    runs-on: ubuntu-latest
    env:
      # disable default JVM in container
      JAVA_HOME: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}

      - name: Install TOOLS
        uses: ./.github/actions/tools-install

      - name: Compile
        run: task compile

  test:
    name: Test
    needs: [ release-version ]
    runs-on: ubuntu-latest
    env:
      # disable default JVM in container
      JAVA_HOME: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}

      - name: Install Tools
        uses: ./.github/actions/tools-install

      - name: Test
        run: task test

  build:
    name: Build
    needs: [ compile, test ]
    runs-on: ubuntu-latest
    env:
      # disable default JVM in container
      JAVA_HOME: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}

      - name: Install TOOLS
        uses: ./.github/actions/tools-install

      - name: Build
        run: task build

      - name: Upload compiled output in artifact
        uses: actions/upload-artifact@v4
        with:
          name: ms-build
          path: code/build/

  publish-jar:
    name: Publish Jar
    needs: [build]
    runs-on: ubuntu-latest
    env:
      # disable default JVM in container
      JAVA_HOME: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}

      - name: Download compiled output from artifact
        uses: actions/download-artifact@v4
        with:
          name: ms-build
          path: code/build/

      - name: Deploy Jar
        working-directory: code
        run: |
          # Update step to deploy jar in the artifactory of the company
          MS_GROUP=$(grep "group" gradle.properties | cut -d'=' -f2)
          MS_NAME=$(grep "name" gradle.properties | cut -d'=' -f2)
          MS_VERSION=$(grep "version" gradle.properties | cut -d'=' -f2)
          
          echo "Deploy Jar ($MS_GROUP.$MS_NAME-$MS_VERSION)"

  publish-docker:
    name: Publish Docker
    needs: [build]
    runs-on: ubuntu-latest
    env:
      # disable default JVM in container
      JAVA_HOME: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}

      - name: Download compiled output from artifact
        uses: actions/download-artifact@v4
        with:
          name: ms-build
          path: code/build/

      - name: Set up Docker Build
        uses: docker/setup-buildx-action@v3

      - name: Generate docker image tag name
        id: generate-docker-image-tag-name
        working-directory: code
        run: |
          # Update step to deploy jar in the artifactory of the company
          MS_GROUP=$(grep "group" gradle.properties | cut -d'=' -f2)
          MS_NAME=$(grep "name" gradle.properties | cut -d'=' -f2)
          MS_VERSION=$(grep "version" gradle.properties | cut -d'=' -f2)

          echo "tags=$MS_GROUP/$MS_NAME:$MS_VERSION" >> $GITHUB_OUTPUT

      - name: Build the Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./.github/Dockerfile
          push: false
          tags: ${{ steps.generate-docker-image-tag-name.outputs.tags }}

      - name: Deploy docker image
        working-directory: code
        run: |
          # Update step to deploy docker image
          MS_GROUP=$(grep "group" gradle.properties | cut -d'=' -f2)
          MS_NAME=$(grep "name" gradle.properties | cut -d'=' -f2)
          MS_VERSION=$(grep "version" gradle.properties | cut -d'=' -f2)
          
          echo "Deploy docker image ($MS_GROUP/$MS_NAME:$MS_VERSION)"

  deploy:
    name: Deploy
    needs: [publish-docker]
    runs-on: ubuntu-latest
    env:
      # disable default JVM in container
      JAVA_HOME: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}

      - name: Execute docker image
        working-directory: code
        run: |
          # Update step to execute docker image in infra
          MS_GROUP=$(grep "group" gradle.properties | cut -d'=' -f2)
          MS_NAME=$(grep "name" gradle.properties | cut -d'=' -f2)
          MS_VERSION=$(grep "version" gradle.properties | cut -d'=' -f2)
          
          echo "Execute docker image in infra ($MS_GROUP/$MS_NAME:$MS_VERSION)"
